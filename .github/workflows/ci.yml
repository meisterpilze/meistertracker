name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Fail on HIGH or CRITICAL transitive vulns. Moderate findings only
      # warn (audit output is still printed). Run `npm audit fix` locally
      # when this step fails.
      - name: Audit dependencies
        run: npm audit --audit-level=high

      # Fail if any production dep ships a license outside the AGPL-3.0
      # compatible allowlist in package.json. Update the allowlist there
      # if a new dep introduces a permissive license that's still safe.
      - name: License check
        run: npm run license-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Tests
        run: npm test
